[package]
name = "prodex"
version = "0.2.78"
edition = "2024"
description = "Safe multi-account auto-rotate for Codex CLI with isolated CODEX_HOME profiles"
license = "MIT"
readme = "README.md"
repository = "https://github.com/christiandoxa/prodex"

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["clock"] }
clap = { version = "4.6.0", features = ["derive"] }
dirs = "6.0.0"
fs2 = "0.4.3"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tiny_http = "0.12.0"
tokio = { version = "1.50.0", features = ["rt-multi-thread", "time"] }
tungstenite = { version = "0.29.0", default-features = false, features = ["handshake", "rustls-tls-native-roots", "url"] }
