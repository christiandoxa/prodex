[package]
name = "prodex"
version = "0.1.0"
edition = "2024"
description = "A multi-profile wrapper for Codex CLI with isolated CODEX_HOME state and quota checks"
license = "MIT"
readme = "README.md"
repository = "https://github.com/christiandoxa/prodex"

[dependencies]
anyhow = "1.0.100"
chrono = { version = "0.4.42", features = ["clock"] }
clap = { version = "4.5.48", features = ["derive"] }
dirs = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
