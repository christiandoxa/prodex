[package]
name = "prodex"
version = "0.2.10"
edition = "2024"
description = "A multi-profile wrapper for Codex CLI with isolated CODEX_HOME state and quota checks"
license = "MIT"
readme = "README.md"
repository = "https://github.com/christiandoxa/prodex"

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["clock"] }
clap = { version = "4.6.0", features = ["derive"] }
dirs = "6.0.0"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
