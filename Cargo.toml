[package]
name = "prodex"
version = "0.49.0"
edition = "2024"
description = "OpenAI profile pooling and safe auto-rotate for Codex CLI and Claude Code"
license = "MIT"
readme = "README.md"
repository = "https://github.com/christiandoxa/prodex"

[features]
default = []
bench-support = []

[dependencies]
aes-gcm-siv = "0.11.1"
anyhow = "1.0.102"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["clock"] }
clap = { version = "4.6.1", features = ["derive"] }
dirs = "6.0.0"
fs2 = "0.4.3"
getrandom = "0.4.2"
pbkdf2 = "0.12.2"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
rpassword = "7.4.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
tiny_http = "0.12.0"
tokio = { version = "1.52.1", features = ["rt-multi-thread", "time"] }
toml = "1.1.2"
tungstenite = { version = "0.29.0", default-features = false, features = ["handshake", "rustls-tls-native-roots", "url"] }

[dev-dependencies]
criterion = "0.5.1"

[[bench]]
name = "runtime_proxy_hot_paths"
harness = false
required-features = ["bench-support"]
