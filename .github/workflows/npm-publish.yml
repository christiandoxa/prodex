name: release publish

on:
  workflow_dispatch:
  push:
    tags:
      - "prodex-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: x86_64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            max-glibc: GLIBC_2.23
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: aarch64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            max-glibc: GLIBC_2.23
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
            artifact-name: x86_64-apple-darwin
            binary-name: prodex
            use-cross: false
          - target: aarch64-apple-darwin
            runs-on: macos-14
            artifact-name: aarch64-apple-darwin
            binary-name: prodex
            use-cross: false
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: x86_64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: aarch64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use-cross }}
        run: cargo install cross --locked

      - name: Build prodex
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Verify Linux GLIBC baseline
        if: ${{ contains(matrix.target, 'unknown-linux-gnu') }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary-name }}"
          versions="$(readelf --version-info "${binary}" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)"
          if [ -z "${versions}" ]; then
            echo "failed to detect GLIBC symbol versions for ${binary}" >&2
            exit 1
          fi
          max_required="$(printf '%s\n' "${versions}" | tail -n1)"
          echo "detected GLIBC requirements for ${binary}:"
          printf '%s\n' "${versions}"
          if [ "$(printf '%s\n%s\n' "${max_required}" "${{ matrix.max-glibc }}" | sort -V | tail -n1)" != "${{ matrix.max-glibc }}" ]; then
            echo "binary requires ${max_required}, which exceeds allowed baseline ${{ matrix.max-glibc }}" >&2
            exit 1
          fi

      - name: Prepare binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact-name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary-name }}" "dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}
          if-no-files-found: error
          retention-days: 7

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate publish
        run: cargo publish --locked --dry-run

      - name: Log in to crates.io
        run: cargo login "${CRATES_TOKEN}"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}

      - name: Publish crate
        run: cargo publish --locked

  publish-npm:
    name: Stage and publish npm packages
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-crate

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Stage npm packages
        run: node scripts/npm/stage.mjs --input-dir artifacts --output-dir release

      - name: Sync package versions
        run: node scripts/npm/sync-version.mjs --root release/packages

      - name: Publish staged packages
        run: node scripts/npm/publish.mjs --root release --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
