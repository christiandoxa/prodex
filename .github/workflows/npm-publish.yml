name: release publish

on:
  workflow_dispatch:
  push:
    tags:
      - "0.*.*"

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: x86_64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            can-native-smoke: true
            max-glibc: GLIBC_2.23
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: aarch64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            can-native-smoke: false
            max-glibc: GLIBC_2.23
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
            artifact-name: x86_64-apple-darwin
            binary-name: prodex
            use-cross: false
            can-native-smoke: true
          - target: aarch64-apple-darwin
            runs-on: macos-14
            artifact-name: aarch64-apple-darwin
            binary-name: prodex
            use-cross: false
            can-native-smoke: true
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: x86_64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false
            can-native-smoke: true
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: aarch64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false
            can-native-smoke: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use-cross }}
        run: cargo install cross --locked

      - name: Build prodex
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Verify Linux GLIBC baseline
        if: ${{ contains(matrix.target, 'unknown-linux-gnu') }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary-name }}"
          versions="$(readelf --version-info "${binary}" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)"
          if [ -z "${versions}" ]; then
            echo "failed to detect GLIBC symbol versions for ${binary}" >&2
            exit 1
          fi
          max_required="$(printf '%s\n' "${versions}" | tail -n1)"
          echo "detected GLIBC requirements for ${binary}:"
          printf '%s\n' "${versions}"
          if [ "$(printf '%s\n%s\n' "${max_required}" "${{ matrix.max-glibc }}" | sort -V | tail -n1)" != "${{ matrix.max-glibc }}" ]; then
            echo "binary requires ${max_required}, which exceeds allowed baseline ${{ matrix.max-glibc }}" >&2
            exit 1
          fi

      - name: Native smoke test
        if: ${{ matrix.can-native-smoke }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary-name }}"
          "${binary}" --version

      - name: Prepare binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact-name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary-name }}" "dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"

      - name: Attest binary artifact provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Stage and publish npm packages
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm publish toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm_version="$(npm --version)"
          echo "${npm_version}"
          node - "${npm_version}" <<'NODE'
          const version = process.argv[2];
          const [major, minor, patch] = version.split(".").map(Number);
          if (
            major < 11 ||
            (major === 11 && minor < 5) ||
            (major === 11 && minor === 5 && patch < 1)
          ) {
            throw new Error(`npm ${version} is too old for provenance publishing`);
          }
          NODE

      - name: Stage npm packages
        run: node scripts/npm/stage.mjs --input-dir artifacts --output-dir release

      - name: Sync package versions
        run: node scripts/npm/sync-version.mjs --root release/packages

      - name: Generate release SBOM
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}/release:/source:ro" \
            anchore/syft:v1.41.2 \
            dir:/source -o spdx-json > release-sbom.spdx.json

      - name: Upload release SBOM
        uses: actions/upload-artifact@v7
        with:
          name: release-sbom
          path: release-sbom.spdx.json
          if-no-files-found: error

      - name: Publish staged packages
        run: node scripts/npm/publish.mjs --root release --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  sync-release-docs:
    name: Sync release docs
    runs-on: ubuntu-latest
    needs:
      - publish-npm
    permissions:
      contents: write

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["package"]["version"])
          PY
          )"
          ref_name="${GITHUB_REF_NAME}"
          ref_type="${GITHUB_REF_TYPE:-branch}"
          target_sha="${GITHUB_SHA}"
          if [ "${ref_type}" = "tag" ]; then
            case "${ref_name}" in
              "${version}") ;;
              *)
                echo "release ref ${ref_name} does not match Cargo.toml version ${version}" >&2
                exit 1
                ;;
            esac
            git fetch origin "refs/tags/${ref_name}:refs/tags/${ref_name}"
            target_sha="$(git rev-list -n1 "${ref_name}")"
          elif [ "${ref_name}" != "main" ]; then
            echo "workflow_dispatch release runs must target main or a matching version tag" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "tag=${version}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Sync versioned install snippets
        shell: bash
        run: |
          set -euo pipefail
          main_sha="$(git rev-parse origin/main)"
          release_sha="${{ steps.release.outputs.target_sha }}"
          version="${{ steps.release.outputs.version }}"
          if [ "${release_sha}" != "${main_sha}" ]; then
            echo "release commit ${release_sha} is not the current origin/main head; skipping docs sync"
            exit 0
          fi
          node scripts/npm/sync-docs-version.mjs --version "${version}"
          if git diff --quiet -- README.md QUICKSTART.md; then
            echo "docs already synced"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md QUICKSTART.md
          git commit -m "docs(release): sync version snippets for ${version}"
          git push origin HEAD:main

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - publish-npm
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["package"]["version"])
          PY
          )"
          ref_name="${GITHUB_REF_NAME}"
          ref_type="${GITHUB_REF_TYPE:-branch}"
          target_sha="${GITHUB_SHA}"
          if [ "${ref_type}" = "tag" ]; then
            case "${ref_name}" in
              "${version}") ;;
              *)
                echo "release ref ${ref_name} does not match Cargo.toml version ${version}" >&2
                exit 1
                ;;
            esac
            git fetch origin "refs/tags/${ref_name}:refs/tags/${ref_name}"
            target_sha="$(git rev-list -n1 "${ref_name}")"
          elif [ "${ref_name}" != "main" ]; then
            echo "workflow_dispatch release runs must target main or a matching version tag" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "tag=${version}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Download release SBOM
        uses: actions/download-artifact@v8
        with:
          name: release-sbom
          path: artifacts/release-sbom

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          while IFS= read -r -d '' file; do
            parent="$(basename "$(dirname "${file}")")"
            base="$(basename "${file}")"
            ext=""
            stem="${base}"
            if [[ "${base}" == *.* ]]; then
              ext=".${base##*.}"
              stem="${base%.*}"
            fi
            cp "${file}" "release-assets/${stem}-${parent}${ext}"
          done < <(find artifacts -mindepth 2 -maxdepth 2 -type f \( -name 'prodex' -o -name 'prodex.exe' \) -print0)
          cp artifacts/release-sbom/release-sbom.spdx.json release-assets/release-sbom.spdx.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          target_sha="${{ steps.release.outputs.target_sha }}"
          title="${version}"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          prodex ${version}

          Install:

          \`\`\`bash
          npm install -g @christiandoxa/prodex@${version}
          \`\`\`
          EOF
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${title}" \
              --notes-file "${notes_file}"
            gh release upload "${tag}" release-assets/* --clobber
          else
            gh release create "${tag}" release-assets/* \
              --target "${target_sha}" \
              --title "${title}" \
              --notes-file "${notes_file}" \
              --latest
          fi

  publish-duration-telemetry:
    name: Publish duration telemetry
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-npm
      - sync-release-docs
      - publish-github-release
    if: ${{ always() }}
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Summarize publish job durations
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          jobs_json="${RUNNER_TEMP}/publish-jobs.json"
          summary_path="${RUNNER_TEMP}/publish-job-durations.txt"
          json_path="${RUNNER_TEMP}/publish-job-durations.json"
          gh run view "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --attempt "${{ github.run_attempt }}" \
            --json jobs > "${jobs_json}"
          set +e
          node scripts/ci/github-job-durations.mjs \
            --max-wall-minutes 12 \
            --max-runner-minutes 40 \
            --run-id "${{ github.run_id }}" \
            --exclude-name "Publish duration telemetry" \
            --limit 12 < "${jobs_json}" \
            | tee "${summary_path}"
          text_status="${PIPESTATUS[0]}"
          node scripts/ci/github-job-durations.mjs \
            --max-wall-minutes 12 \
            --max-runner-minutes 40 \
            --run-id "${{ github.run_id }}" \
            --exclude-name "Publish duration telemetry" \
            --limit 12 \
            --json < "${jobs_json}" > "${json_path}"
          json_status="$?"
          set -e
          {
            echo "### Publish job durations"
            echo
            echo '```text'
            cat "${summary_path}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          if [ "${text_status}" -ne 0 ]; then
            exit "${text_status}"
          fi
          exit "${json_status}"

      - name: Upload publish duration telemetry
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-duration-telemetry
          path: |
            ${{ runner.temp }}/publish-job-durations.txt
            ${{ runner.temp }}/publish-job-durations.json
          if-no-files-found: ignore
          retention-days: 14
