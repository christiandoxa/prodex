name: standalone release

on:
  workflow_dispatch:
  push:
    tags:
      - "0.*.*"

permissions:
  actions: read
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          ref_type="${GITHUB_REF_TYPE:-branch}"
          target_sha="${GITHUB_SHA}"
          if [ "${ref_type}" = "tag" ]; then
            git fetch origin "refs/tags/${ref_name}:refs/tags/${ref_name}"
            target_sha="$(git rev-list -n1 "${ref_name}")"
          elif [ "${ref_name}" != "main" ]; then
            echo "workflow_dispatch release runs must target main or a matching version tag" >&2
            exit 1
          fi
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

      - name: Wait for CI success
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 30 * 60))
          while true; do
            runs_json="$(gh run list --workflow ci.yml --limit 50 --json headSha,status,conclusion,url)"
            set +e
            result="$(
              RUNS_JSON="${runs_json}" python - <<'PY'
          import json
          import os
          import sys

          target = os.environ["TARGET_SHA"]
          runs = [run for run in json.loads(os.environ["RUNS_JSON"]) if run.get("headSha") == target]
          if not runs:
              print("not-found")
              sys.exit(3)
          for run in runs:
              if run.get("status") == "completed":
                  print(f"{run.get('conclusion')} {run.get('url')}")
                  sys.exit(0)
          run = runs[0]
          print(f"{run.get('status')}/{run.get('conclusion') or 'pending'} {run.get('url')}")
          sys.exit(2)
          PY
            )"
            status=$?
            set -e

            if [ "${status}" -eq 0 ]; then
              conclusion="${result%% *}"
              url="${result#* }"
              if [ "${conclusion}" = "success" ]; then
                echo "CI success for ${TARGET_SHA}: ${url}"
                exit 0
              fi
              echo "CI did not pass for ${TARGET_SHA}: ${result}" >&2
              exit 1
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "timed out waiting for CI success for ${TARGET_SHA}: ${result}" >&2
              exit 1
            fi
            echo "CI for ${TARGET_SHA}: ${result}; polling again in 30s"
            sleep 30
          done

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    needs:
      - verify-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: x86_64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            can-native-smoke: true
            max-glibc: GLIBC_2.23
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            artifact-name: aarch64-unknown-linux-gnu
            binary-name: prodex
            use-cross: true
            can-native-smoke: false
            max-glibc: GLIBC_2.23
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
            artifact-name: x86_64-apple-darwin
            binary-name: prodex
            use-cross: false
            can-native-smoke: true
          - target: aarch64-apple-darwin
            runs-on: macos-14
            artifact-name: aarch64-apple-darwin
            binary-name: prodex
            use-cross: false
            can-native-smoke: true
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: x86_64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false
            can-native-smoke: true
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact-name: aarch64-pc-windows-msvc
            binary-name: prodex.exe
            use-cross: false
            can-native-smoke: false

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use-cross }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if CARGO_HTTP_MULTIPLEXING=false cargo install cross --locked; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done

      - name: Install Linux ARM cross compiler
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build prodex
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          for attempt in 1 2 3; do
            if [ "${{ matrix.use-cross }}" = "true" ]; then
              cross build --release --locked --target "${{ matrix.target }}" && exit 0
            else
              cargo build --release --locked --target "${{ matrix.target }}" && exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done

      - name: Verify Linux GLIBC baseline
        if: ${{ contains(matrix.target, 'unknown-linux-gnu') }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary-name }}"
          versions="$(readelf --version-info "${binary}" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)"
          if [ -z "${versions}" ]; then
            echo "failed to detect GLIBC symbol versions for ${binary}" >&2
            exit 1
          fi
          max_required="$(printf '%s\n' "${versions}" | tail -n1)"
          echo "detected GLIBC requirements for ${binary}:"
          printf '%s\n' "${versions}"
          if [ "$(printf '%s\n%s\n' "${max_required}" "${{ matrix.max-glibc }}" | sort -V | tail -n1)" != "${{ matrix.max-glibc }}" ]; then
            echo "binary requires ${max_required}, which exceeds allowed baseline ${{ matrix.max-glibc }}" >&2
            exit 1
          fi

      - name: Native smoke test
        if: ${{ matrix.can-native-smoke }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary-name }}"
          "${binary}" --version

      - name: Prepare binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact-name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary-name }}" "dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"

      - name: Attest binary artifact provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}/${{ matrix.binary-name }}
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  native-client-compat:
    name: Probe current native clients
    runs-on: ubuntu-latest
    needs:
      - build
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Download Linux release binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: x86_64-unknown-linux-gnu
          path: artifacts

      - name: Install current native clients
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          npm install --global @google/gemini-cli
          curl --proto '=https' --tlsv1.2 -fsSLo "${RUNNER_TEMP}/kiro-install.sh" https://cli.kiro.dev/install
          bash "${RUNNER_TEMP}/kiro-install.sh" --force
          curl --proto '=https' --tlsv1.2 -fsSLo "${RUNNER_TEMP}/copilot-install.sh" https://gh.io/copilot-install
          PREFIX="${HOME}/.local" bash "${RUNNER_TEMP}/copilot-install.sh"
          curl --proto '=https' --tlsv1.2 -fsSLo "${RUNNER_TEMP}/claude-install.sh" https://claude.ai/install.sh
          bash "${RUNNER_TEMP}/claude-install.sh" stable
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Verify client discovery and direct-native guards
        shell: bash
        run: |
          set -euo pipefail
          export PATH="${HOME}/.local/bin:${PATH}"
          for command in gemini kiro-cli-chat copilot claude; do
            command -v "${command}"
            "${command}" --version
          done
          gemini --help > "${RUNNER_TEMP}/gemini-help.txt"
          grep -q -- "--yolo" "${RUNNER_TEMP}/gemini-help.txt"
          kiro-cli-chat chat --help > "${RUNNER_TEMP}/kiro-help.txt"
          grep -q -- "--model" "${RUNNER_TEMP}/kiro-help.txt"
          grep -a -q -- "KIRO_DATA_DIR" "$(command -v kiro-cli-chat)"
          copilot help environment > "${RUNNER_TEMP}/copilot-environment.txt"
          for variable in COPILOT_PROVIDER_BASE_URL COPILOT_PROVIDER_TYPE COPILOT_PROVIDER_API_KEY COPILOT_PROVIDER_WIRE_API COPILOT_PROVIDER_TRANSPORT COPILOT_MODEL; do
            grep -q -- "${variable}" "${RUNNER_TEMP}/copilot-environment.txt"
          done
          for variable in ANTHROPIC_BASE_URL ANTHROPIC_AUTH_TOKEN ANTHROPIC_MODEL; do
            grep -a -q -- "${variable}" "$(command -v claude)"
          done
          chmod 0755 artifacts/prodex
          PRODEX_HOME="${RUNNER_TEMP}/prodex-capability" artifacts/prodex capability list --json > "${RUNNER_TEMP}/capabilities.json"
          CAPABILITIES="${RUNNER_TEMP}/capabilities.json" python - <<'PY'
          import json
          import os

          with open(os.environ["CAPABILITIES"], encoding="utf-8") as handle:
              rows = {row["name"]: row for row in json.load(handle)}
          for name in ("gemini", "kiro", "copilot", "claude"):
              assert rows[name]["status"] == "available", rows[name]
          PY
          PRODEX_HOME="${RUNNER_TEMP}/prodex-agy" PRODEX_AGY_BIN=/bin/true artifacts/prodex s gemini --cli agy --no-presidio
          if PRODEX_HOME="${RUNNER_TEMP}/prodex-agy" PRODEX_AGY_BIN=/bin/true artifacts/prodex s gemini --cli agy --presidio 2> "${RUNNER_TEMP}/presidio-error.txt"; then
            echo "native Antigravity unexpectedly accepted --presidio" >&2
            exit 1
          fi
          grep -q -- "--presidio is unsupported" "${RUNNER_TEMP}/presidio-error.txt"

  prepare-release:
    name: Prepare release SBOM
    runs-on: ubuntu-latest
    needs:
      - build
      - native-client-compat

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Generate release SBOM
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}/artifacts:/source:ro" \
            anchore/syft:v1.41.2@sha256:962c5626d30cdfb814802598cbb7b63cb690bf979a4bc0ff1d9c6e0cb441db7f \
            dir:/source -o spdx-json > release-sbom.spdx.json

      - name: Attest release SBOM provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: release-sbom.spdx.json

      - name: Upload release SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-sbom
          path: release-sbom.spdx.json
          if-no-files-found: error
          overwrite: true

  sync-release-docs:
    name: Sync release docs
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    permissions:
      contents: write

    steps:
      - name: Check out release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["package"]["version"])
          PY
          )"
          ref_name="${GITHUB_REF_NAME}"
          ref_type="${GITHUB_REF_TYPE:-branch}"
          target_sha="${GITHUB_SHA}"
          if [ "${ref_type}" = "tag" ]; then
            case "${ref_name}" in
              "${version}") ;;
              *)
                echo "release ref ${ref_name} does not match Cargo.toml version ${version}" >&2
                exit 1
                ;;
            esac
            git fetch origin "refs/tags/${ref_name}:refs/tags/${ref_name}"
            target_sha="$(git rev-list -n1 "${ref_name}")"
          elif [ "${ref_name}" != "main" ]; then
            echo "workflow_dispatch release runs must target main or a matching version tag" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "tag=${version}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Sync documentation version metadata
        shell: bash
        run: |
          set -euo pipefail
          main_sha="$(git rev-parse origin/main)"
          release_sha="${{ steps.release.outputs.target_sha }}"
          version="${{ steps.release.outputs.version }}"
          if [ "${release_sha}" != "${main_sha}" ]; then
            echo "release commit ${release_sha} is not the current origin/main head; skipping docs sync"
            exit 0
          fi
          node scripts/npm/sync-docs-version.mjs --version "${version}"
          if git diff --quiet -- README.md QUICKSTART.md; then
            echo "docs already synced"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md QUICKSTART.md
          git commit -m "docs(release): sync version snippets for ${version}"
          git push origin HEAD:main

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["package"]["version"])
          PY
          )"
          ref_name="${GITHUB_REF_NAME}"
          ref_type="${GITHUB_REF_TYPE:-branch}"
          target_sha="${GITHUB_SHA}"
          if [ "${ref_type}" = "tag" ]; then
            case "${ref_name}" in
              "${version}") ;;
              *)
                echo "release ref ${ref_name} does not match Cargo.toml version ${version}" >&2
                exit 1
                ;;
            esac
            git fetch origin "refs/tags/${ref_name}:refs/tags/${ref_name}"
            target_sha="$(git rev-list -n1 "${ref_name}")"
          elif [ "${ref_name}" != "main" ]; then
            echo "workflow_dispatch release runs must target main or a matching version tag" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "tag=${version}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Download release SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-sbom
          path: artifacts/release-sbom

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          while IFS= read -r -d '' file; do
            parent="$(basename "$(dirname "${file}")")"
            base="$(basename "${file}")"
            ext=""
            stem="${base}"
            if [[ "${base}" == *.* ]]; then
              ext=".${base##*.}"
              stem="${base%.*}"
            fi
            cp "${file}" "release-assets/${stem}-${parent}${ext}"
          done < <(find artifacts -mindepth 2 -maxdepth 2 -type f \( -name 'prodex' -o -name 'prodex.exe' \) -print0)
          cp artifacts/release-sbom/release-sbom.spdx.json release-assets/release-sbom.spdx.json
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          chmod 0755 release-assets/install.sh

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            release-assets/install.sh
            release-assets/install.ps1

      - name: Generate and verify release checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            sha256sum install.sh install.ps1 prodex-* release-sbom.spdx.json > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

      - name: Verify release provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' asset; do
            gh attestation verify "${asset}" --repo "${GITHUB_REPOSITORY}"
          done < <(find release-assets -maxdepth 1 -type f ! -name SHA256SUMS -print0)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          target_sha="${{ steps.release.outputs.target_sha }}"
          title="${version}"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          prodex ${version}

          Install:

          \`\`\`bash
          curl -fsSL https://github.com/christiandoxa/prodex/releases/download/${version}/install.sh | sh -s -- --release ${version}
          \`\`\`

          Windows PowerShell:

          \`\`\`powershell
          \$env:PRODEX_RELEASE='${version}'; irm https://github.com/christiandoxa/prodex/releases/download/${version}/install.ps1 | iex
          \`\`\`

          Update future releases with \`prodex update\`.
          EOF
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${title}" \
              --notes-file "${notes_file}"
            gh release upload "${tag}" release-assets/* --clobber
          else
            gh release create "${tag}" release-assets/* \
              --target "${target_sha}" \
              --title "${title}" \
              --notes-file "${notes_file}" \
              --latest
          fi

  publish-duration-telemetry:
    name: Publish duration telemetry
    runs-on: ubuntu-latest
    needs:
      - build
      - prepare-release
      - sync-release-docs
      - publish-github-release
    if: ${{ always() }}
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Summarize publish job durations
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          jobs_json="${RUNNER_TEMP}/publish-jobs.json"
          summary_path="${RUNNER_TEMP}/publish-job-durations.txt"
          json_path="${RUNNER_TEMP}/publish-job-durations.json"
          gh run view "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --attempt "${{ github.run_attempt }}" \
            --json jobs > "${jobs_json}"
          set +e
          node scripts/ci/github-job-durations.mjs \
            --max-wall-minutes 12 \
            --max-runner-minutes 50 \
            --run-id "${{ github.run_id }}" \
            --exclude-name "Publish duration telemetry" \
            --limit 12 < "${jobs_json}" \
            | tee "${summary_path}"
          text_status="${PIPESTATUS[0]}"
          node scripts/ci/github-job-durations.mjs \
            --max-wall-minutes 12 \
            --max-runner-minutes 50 \
            --run-id "${{ github.run_id }}" \
            --exclude-name "Publish duration telemetry" \
            --limit 12 \
            --json < "${jobs_json}" > "${json_path}"
          json_status="$?"
          set -e
          {
            echo "### Publish job durations"
            echo
            echo '```text'
            cat "${summary_path}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          if [ "${text_status}" -ne 0 ]; then
            exit "${text_status}"
          fi
          exit "${json_status}"

      - name: Upload publish duration telemetry
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: publish-duration-telemetry
          path: |
            ${{ runner.temp }}/publish-job-durations.txt
            ${{ runner.temp }}/publish-job-durations.json
          if-no-files-found: ignore
          overwrite: true
          retention-days: 14
