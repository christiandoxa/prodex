version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Jakarta
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Asia/Jakarta
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Jakarta
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
