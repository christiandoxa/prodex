[package]
name = "prodex-app-reports"
version.workspace = true
edition.workspace = true
description = "App command report helpers for prodex"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "prodex_app_reports"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4.44", features = ["clock"] }
prodex_quota = { package = "prodex-quota", path = "../prodex-quota" }
prodex_runtime_state = { package = "prodex-runtime-state", path = "../prodex-runtime-state" }
prodex_shared_types = { package = "prodex-shared-types", path = "../prodex-shared-types" }
prodex_state = { package = "prodex-state", path = "../prodex-state" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
