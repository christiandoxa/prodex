[package]
name = "prodex-shared-types"
version.workspace = true
edition.workspace = true
description = "Shared internal data types for prodex"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "prodex_shared_types"
path = "src/lib.rs"

[dependencies]
prodex_quota = { package = "prodex-quota", path = "../prodex-quota" }
prodex_runtime_proxy = { package = "prodex-runtime-proxy", path = "../prodex-runtime-proxy" }
prodex_state = { package = "prodex-state", path = "../prodex-state" }
serde = { version = "1.0.228", features = ["derive"] }
