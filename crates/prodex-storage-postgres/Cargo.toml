license.workspace = true
repository.workspace = true

[lib]
name = "prodex_storage_postgres"
path = "src/lib.rs"

[dependencies]
prodex_domain = { workspace = true }
prodex_storage = { workspace = true }

[dev-dependencies]
postgres = { workspace = true, features = ["with-uuid-1"] }
