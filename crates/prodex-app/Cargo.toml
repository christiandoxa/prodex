[package]
name = "prodex-app"
version.workspace = true
edition.workspace = true
description = "Application orchestration crate for the prodex CLI"
license.workspace = true
repository.workspace = true

[lib]
name = "prodex_app"
path = "src/lib.rs"
test = false
doctest = false

[features]
default = []
bench-support = ["dep:prodex_bench_support"]
allocation-bench-support = ["dep:prodex_bench_support"]

[dependencies]
anyhow = { workspace = true }
arc-swap = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
crossterm = { workspace = true }
dirs = { workspace = true }
fs2 = { workspace = true }
getrandom = { workspace = true }
portable-pty = { workspace = true }
os_info = { workspace = true }
prodex_audit_log = { workspace = true }
prodex_app_reports = { workspace = true }
prodex_application = { workspace = true }
prodex_authn = { workspace = true }
prodex_bench_support = { workspace = true, optional = true }
codex_config = { workspace = true }
prodex_caveman_assets = { workspace = true }
prodex_cli = { workspace = true }
prodex_config = { workspace = true }
prodex_control_plane = { workspace = true }
prodex_context = { workspace = true }
prodex_domain = { workspace = true }
prodex_core = { workspace = true }
prodex_gateway_core = { workspace = true }
prodex_gateway_http = { workspace = true }
prodex_housekeeping = { workspace = true }
prodex_mcp_stdio = { workspace = true }
prodex_observability = { workspace = true }
prodex_presidio = { workspace = true }
prodex_profile_export = { workspace = true }
prodex_profile_identity = { workspace = true }
prodex_provider_core = { workspace = true }
prodex_provider_spi = { workspace = true }
prodex_proxy_config = { workspace = true }
prodex_quota = { workspace = true }
prodex_runtime_quota = { workspace = true }
prodex_runtime_state = { workspace = true }
prodex_storage = { workspace = true }
prodex_storage_postgres = { workspace = true }
prodex_storage_postgres_runtime = { workspace = true }
prodex_storage_redis = { workspace = true }
prodex_storage_redis_runtime = { workspace = true }
prodex_storage_sqlite = { workspace = true }
postgres = { workspace = true, features = ["with-uuid-1"] }
redaction = { workspace = true }
redis = { workspace = true }
reqwest = { workspace = true, features = ["blocking", "json", "rustls", "system-proxy", "socks"] }
ratatui = { workspace = true }
rpassword = { workspace = true }
rusqlite = { workspace = true }
runtime_anthropic_crate = { workspace = true }
prodex_runtime_doctor = { workspace = true }
