prodex_runtime_claude = { workspace = true }
prodex_runtime_cookies = { workspace = true }
prodex_runtime_launch = { workspace = true }
runtime_log = { workspace = true }
runtime_metrics = { workspace = true }
prodex_runtime_policy = { workspace = true }
runtime_proxy_crate = { workspace = true }
prodex_runtime_store = { workspace = true }
prodex_runtime_tuning = { workspace = true }
prodex_session_store = { workspace = true }
prodex_shared_codex_fs = { workspace = true }
prodex_shared_types = { workspace = true }
prodex_state = { workspace = true }
secret_store = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
terminal_ui = { workspace = true }
