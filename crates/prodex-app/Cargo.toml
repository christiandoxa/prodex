[package]
name = "prodex-app"
version.workspace = true
edition.workspace = true
description = "Application orchestration crate for the prodex CLI"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "prodex_app"
path = "src/lib.rs"
test = false
doctest = false

[features]
default = []
bench-support = ["dep:prodex_bench_support"]

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["clock"] }
clap = { version = "4.6.1", features = ["derive"] }
dirs = "6.0.0"
fs2 = "0.4.3"
prodex_audit_log = { package = "prodex-audit-log", path = "../prodex-audit-log" }
prodex_app_reports = { package = "prodex-app-reports", path = "../prodex-app-reports" }
prodex_bench_support = { package = "prodex-bench-support", path = "../prodex-bench-support", optional = true }
codex_config = { package = "prodex-codex-config", path = "../prodex-codex-config" }
prodex_caveman_assets = { package = "prodex-caveman-assets", path = "../prodex-caveman-assets" }
prodex_cli = { package = "prodex-cli", path = "../prodex-cli" }
prodex_context = { package = "prodex-context", path = "../prodex-context" }
prodex_core = { package = "prodex-core", path = "../prodex-core" }
prodex_housekeeping = { package = "prodex-housekeeping", path = "../prodex-housekeeping" }
prodex_profile_export = { package = "prodex-profile-export", path = "../prodex-profile-export" }
prodex_profile_identity = { package = "prodex-profile-identity", path = "../prodex-profile-identity" }
prodex_proxy_config = { package = "prodex-proxy-config", path = "../prodex-proxy-config" }
prodex_quota = { package = "prodex-quota", path = "../prodex-quota" }
prodex_runtime_mem = { package = "prodex-runtime-mem", path = "../prodex-runtime-mem" }
prodex_runtime_quota = { package = "prodex-runtime-quota", path = "../prodex-runtime-quota" }
prodex_runtime_state = { package = "prodex-runtime-state", path = "../prodex-runtime-state" }
redaction = { package = "prodex-redaction", path = "../prodex-redaction" }
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls", "system-proxy", "socks"] }
rpassword = "7.4.0"
runtime_anthropic_crate = { package = "prodex-runtime-anthropic", path = "../prodex-runtime-anthropic" }
prodex_runtime_doctor = { package = "prodex-runtime-doctor", path = "../prodex-runtime-doctor" }
prodex_runtime_broker = { package = "prodex-runtime-broker", path = "../prodex-runtime-broker" }
prodex_runtime_broker_log = { package = "prodex-runtime-broker-log", path = "../prodex-runtime-broker-log" }
prodex_runtime_capabilities = { package = "prodex-runtime-capabilities", path = "../prodex-runtime-capabilities" }
prodex_runtime_claude = { package = "prodex-runtime-claude", path = "../prodex-runtime-claude" }
prodex_runtime_cookies = { package = "prodex-runtime-cookies", path = "../prodex-runtime-cookies" }
prodex_runtime_launch = { package = "prodex-runtime-launch", path = "../prodex-runtime-launch" }
runtime_log = { package = "prodex-runtime-log", path = "../prodex-runtime-log" }
runtime_metrics = { package = "prodex-runtime-metrics", path = "../prodex-runtime-metrics" }
prodex_runtime_policy = { package = "prodex-runtime-policy", path = "../prodex-runtime-policy" }
runtime_proxy_crate = { package = "prodex-runtime-proxy", path = "../prodex-runtime-proxy" }
prodex_runtime_store = { package = "prodex-runtime-store", path = "../prodex-runtime-store" }
prodex_runtime_tuning = { package = "prodex-runtime-tuning", path = "../prodex-runtime-tuning" }
prodex_session_store = { package = "prodex-session-store", path = "../prodex-session-store" }
prodex_shared_codex_fs = { package = "prodex-shared-codex-fs", path = "../prodex-shared-codex-fs" }
prodex_shared_types = { package = "prodex-shared-types", path = "../prodex-shared-types" }
prodex_state = { package = "prodex-state", path = "../prodex-state" }
secret_store = { package = "prodex-secret-store", path = "../prodex-secret-store" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.11.0"
terminal_ui = { package = "prodex-terminal-ui", path = "../prodex-terminal-ui" }
prodex_update_notice = { package = "prodex-update-notice", path = "../prodex-update-notice" }
tiny_http = "0.12.0"
tokio = { version = "1.52.1", features = ["rt-multi-thread", "time"] }
toml = "1.1.2"
tungstenite = { version = "0.29.0", default-features = false, features = ["handshake", "rustls-tls-native-roots", "url"] }


[dev-dependencies]
aes-gcm-siv = "0.11.1"
