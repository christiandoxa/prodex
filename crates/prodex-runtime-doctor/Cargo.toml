[package]
name = "prodex-runtime-doctor"
version.workspace = true
edition.workspace = true
description = "Runtime doctor log parsing and diagnostics for prodex"
license.workspace = true
repository.workspace = true

[lib]
name = "prodex_runtime_doctor"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["clock"] }
prodex_quota = { workspace = true }
prodex_runtime_state = { workspace = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
terminal_ui = { workspace = true }
