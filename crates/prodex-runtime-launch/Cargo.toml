[package]
name = "prodex-runtime-launch"
version.workspace = true
edition.workspace = true
description = "Runtime launch planning primitives for prodex"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "prodex_runtime_launch"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.102"
codex_config = { package = "prodex-codex-config", path = "../prodex-codex-config" }
prodex_quota = { package = "prodex-quota", path = "../prodex-quota" }
prodex_shared_types = { package = "prodex-shared-types", path = "../prodex-shared-types" }
prodex_state = { package = "prodex-state", path = "../prodex-state" }
redaction = { package = "prodex-redaction", path = "../prodex-redaction" }
reqwest = { version = "0.13.2", default-features = false }
runtime_proxy = { package = "prodex-runtime-proxy", path = "../prodex-runtime-proxy" }
terminal_ui = { package = "prodex-terminal-ui", path = "../prodex-terminal-ui" }
