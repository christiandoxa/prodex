[package]
name = "prodex-update-notice"
version.workspace = true
edition.workspace = true
description = "Prodex update notice and version check helpers"
license.workspace = true
repository.workspace = true

[lib]
name = "prodex_update_notice"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["clock"] }
prodex_cli = { package = "prodex-cli", path = "../prodex-cli", version = "0.85.0" }
prodex_core = { package = "prodex-core", path = "../prodex-core", version = "0.85.0" }
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls", "system-proxy", "socks"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
terminal_ui = { package = "prodex-terminal-ui", path = "../prodex-terminal-ui", version = "0.85.0" }
