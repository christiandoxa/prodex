[package]
name = "prodex-runtime-broker"
version.workspace = true
edition.workspace = true
description = "Runtime broker registry, health, and metrics DTOs for prodex"
license.workspace = true
repository.workspace = true

[lib]
name = "prodex_runtime_broker"
path = "src/lib.rs"

[dependencies]
prodex_runtime_state = { package = "prodex-runtime-state", path = "../prodex-runtime-state", version = "0.85.0" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
