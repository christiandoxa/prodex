[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = [
    { name = "native-tls", reason = "Prodex standardizes outbound TLS on rustls" },
    { name = "openssl", reason = "Prodex standardizes outbound TLS on rustls" },
]
# Exact older transitive lines retained by upstream crates. Remove an entry as
# soon as `cargo tree -i <crate>@<version>` no longer reports it.
skip = [
    { name = "bitflags", version = "1.3.2", reason = "portable-pty has not moved to bitflags 2" },
    { name = "block-buffer", version = "0.10.4", reason = "digest 0.10 compatibility stack" },
    { name = "cfg_aliases", version = "0.1.1", reason = "nix 0.28 build dependency" },
    { name = "const-oid", version = "0.9.6", reason = "x509-cert still uses const-oid 0.9" },
    { name = "core-foundation", version = "0.9.4", reason = "system-configuration transitive dependency" },
    { name = "cpufeatures", version = "0.2.17", reason = "AES, Argon2, Polyval, and SHA-1 compatibility stack" },
    { name = "crypto-common", version = "0.1.7", reason = "older AEAD, cipher, digest, and universal-hash stack" },
    { name = "digest", version = "0.10.7", reason = "Blake2 and SHA-1 compatibility stack" },
    { name = "fallible-iterator", version = "0.2.0", reason = "PostgreSQL client protocol stack" },
    { name = "getrandom", version = "0.2.17", reason = "deadpool/JWT/rand_core 0.6 compatibility stack" },
    { name = "hashbrown", version = "0.16.1", reason = "kasuari and rsqlite-vfs transitive dependency" },
    { name = "hmac", version = "0.12.1", reason = "Secret Service keyring backend compatibility stack" },
    { name = "nix", version = "0.28.0", reason = "portable-pty transitive dependency" },
    { name = "rand_core", version = "0.6.4", reason = "password-hash compatibility stack" },
    { name = "sha2", version = "0.10.9", reason = "Secret Service keyring backend compatibility stack" },
    { name = "thiserror", version = "1.0.69", reason = "filedescriptor has not converged on thiserror 2" },
    { name = "thiserror-impl", version = "1.0.69", reason = "paired with the retained thiserror 1 line" },
    { name = "untrusted", version = "0.7.1", reason = "aws-lc-rs compatibility line" },
    { name = "wasi", version = "0.11.1+wasi-snapshot-preview1", reason = "getrandom 0.2 and mio target dependency" },
    { name = "windows-sys", version = "0.59.0", reason = "rtoolbox/rpassword transitive dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
